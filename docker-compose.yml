name: russ-nails

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: russ_nails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d russ_nails"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URI: postgres://postgres:postgres@postgres:5432/russ_nails
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-replace-with-a-strong-secret}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:4000}
      HOST: 0.0.0.0
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - cms_media:/app/media

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-256762267569}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-256762267569}
      PAYLOAD_API_URL: http://cms:4000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ORDER_NOTIFICATION_FROM_EMAIL: ${ORDER_NOTIFICATION_FROM_EMAIL:-info@russnails.com}
      ORDER_NOTIFICATION_TO_EMAIL: ${ORDER_NOTIFICATION_TO_EMAIL:-info@russnails.com}
      ENABLE_WHATSAPP_INQUIRY_EMAIL: ${ENABLE_WHATSAPP_INQUIRY_EMAIL:-true}
    depends_on:
      - cms
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  cms_media: